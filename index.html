<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero AI</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#e8e8f0;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #1e1e2e;background:#13131a;flex-shrink:0}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:32px;height:32px;background:#6c63ff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;box-shadow:0 0 16px rgba(108,99,255,.4)}
  .logo-text{font-size:18px;font-weight:700}
  .logo-text span{color:#6c63ff}
  .pill{display:flex;align-items:center;gap:6px;background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.2);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:500;color:#6c63ff}
  .dot{width:6px;height:6px;background:#4ade80;border-radius:50%;animation:pulse 2s infinite}
  #chat{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:#1e1e2e transparent}
  #chat::-webkit-scrollbar{width:4px}
  #chat::-webkit-scrollbar-thumb{background:#1e1e2e;border-radius:4px}
  .welcome{text-align:center;padding:32px 16px 16px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .welcome-icon{width:56px;height:56px;background:#6c63ff;border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;color:#fff;box-shadow:0 0 32px rgba(108,99,255,.3)}
  .welcome h1{font-size:22px;font-weight:700}
  .welcome p{font-size:13px;color:#6b6b80;max-width:280px;line-height:1.6}
  .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
  .chip{background:#13131a;border:1px solid #1e1e2e;border-radius:20px;padding:7px 14px;font-size:12px;color:#6b6b80;cursor:pointer;transition:all .2s;white-space:nowrap}
  .chip:hover{border-color:#6c63ff;color:#6c63ff;background:rgba(108,99,255,.08)}
  .msg{display:flex;gap:10px;animation:fadeUp .2s ease}
  .msg.user{flex-direction:row-reverse}
  .avatar{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;margin-top:2px}
  .msg.ai .avatar{background:#6c63ff;color:#fff;box-shadow:0 0 10px rgba(108,99,255,.3)}
  .msg.user .avatar{background:#1e1e2e;color:#6b6b80}
  .bubble{max-width:calc(100% - 48px);padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
  .msg.ai .bubble{background:#13131a;border:1px solid #1e1e2e;border-top-left-radius:4px}
  .msg.user .bubble{background:#6c63ff;border-top-right-radius:4px;color:#fff}
  .cursor{display:inline-block;width:2px;height:14px;background:#6c63ff;margin-left:2px;vertical-align:middle;animation:blink 1s infinite}
  .input-area{padding:12px 16px 16px;border-top:1px solid #1e1e2e;background:#13131a;flex-shrink:0}
  .input-row{display:flex;gap:10px;align-items:flex-end;background:#0a0a0f;border:1px solid #1e1e2e;border-radius:14px;padding:10px 12px}
  textarea{flex:1;background:none;border:none;outline:none;color:#e8e8f0;font-family:inherit;font-size:14px;resize:none;max-height:100px;line-height:1.5;min-height:22px}
  textarea::placeholder{color:#3a3a50}
  button{width:34px;height:34px;background:#6c63ff;border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;box-shadow:0 0 12px rgba(108,99,255,.3)}
  button:hover{background:#7c74ff}
  button:disabled{opacity:.4;cursor:not-allowed}
  .hint{text-align:center;font-size:10px;color:#3a3a50;margin-top:8px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">Z</div>
    <div class="logo-text">Zero <span>AI</span></div>
  </div>
  <div class="pill"><div class="dot"></div>Online</div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">Z</div>
    <h1>Zero AI</h1>
    <p>Your professional search assistant. Ask me anything.</p>
    <div class="chips">
      <div class="chip" onclick="useSuggestion(this)">What is machine learning?</div>
      <div class="chip" onclick="useSuggestion(this)">How does the internet work?</div>
      <div class="chip" onclick="useSuggestion(this)">Explain quantum computing</div>
      <div class="chip" onclick="useSuggestion(this)">What is blockchain?</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="inp" placeholder="Ask Zero AI anything..." rows="1" onkeydown="onKey(event)" oninput="resize(this)"></textarea>
    <button id="btn" onclick="send()" title="Send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="hint">Powered by Zero AI · Professional Search Assistant</div>
</div>

<script>
  const chat = document.getElementById('chat');
  const inp = document.getElementById('inp');
  const btn = document.getElementById('btn');
  let history = [];
  let busy = false;

  function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
  function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}
  function useSuggestion(el){inp.value=el.textContent;send()}
  function scrollDown(){chat.scrollTop=chat.scrollHeight}

  function addMsg(role,text){
    const w=document.getElementById('welcome');if(w)w.remove();
    const d=document.createElement('div');d.className='msg '+role;
    const av=document.createElement('div');av.className='avatar';av.textContent=role==='ai'?'Z':'U';
    const b=document.createElement('div');b.className='bubble';b.textContent=text;
    d.appendChild(av);d.appendChild(b);chat.appendChild(d);scrollDown();
    return b;
  }

  async function send(){
    const text=inp.value.trim();
    if(!text||busy)return;
    busy=true;btn.disabled=true;
    inp.value='';inp.style.height='auto';
    addMsg('user',text);
    history.push({role:'user',content:text});

    const aiBubble=addMsg('ai','');
    const cursor=document.createElement('span');cursor.className='cursor';aiBubble.appendChild(cursor);

    try{
      const res=await fetch('/api/chat',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:history})
      });
      const reader=res.body.getReader();
      const dec=new TextDecoder();
      let full='';
      while(true){
        const{done,value}=await reader.read();if(done)break;
        for(const line of dec.decode(value).split('\n')){
          if(!line.startsWith('data: '))continue;
          try{
            const j=JSON.parse(line.slice(6));
            if(j.delta?.text){full+=j.delta.text;aiBubble.textContent=full;aiBubble.appendChild(cursor);scrollDown();}
          }catch{}
        }
      }
      history.push({role:'assistant',content:full});
    }catch{
      aiBubble.textContent='Connection error. Please try again.';
    }
    cursor.remove();
    busy=false;btn.disabled=false;inp.focus();
  }
</script>
</body>
</html>
